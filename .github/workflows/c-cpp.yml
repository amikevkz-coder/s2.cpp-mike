name: Windows CMake CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Cambiado de ubuntu-latest a windows-latest para generar un ejecutable .exe nativo
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Crow es una biblioteca de cabeceras C++, en Windows se descarga de forma idéntica
    - name: Install Crow Framework
      shell: bash
      run: |
        git clone https://github.com
        cd Crow
        mkdir build && cd build
        cmake .. -DCROW_BUILD_EXAMPLES=OFF -DCROW_BUILD_TESTS=OFF
        cmake --build . --target install --config Release

    # Las máquinas windows-latest ya incluyen Vulkan SDK, solo verificamos que CMake lo detecte
    - name: Configure CMake (Windows + Vulkan)
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DS2_VULKAN=ON
    
    - name: Build Project
      run: cmake --build build --config Release --parallel
